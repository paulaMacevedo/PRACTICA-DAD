spring.application.name=instance-service
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/instances_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user_instances}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:passwordinstances}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

